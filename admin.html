<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin - Manica Baby Rent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #fff0f5; padding: 20px; }
   .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
   .header h1 { color: #e91e63; text-align: center; flex: 1; margin: 0; font-size: 22px; }
   .btn-kecil { background: #dc3545; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }
   .btn-kecil:hover { background: #b02a37; }
   .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
   .total { font-weight: bold; color: #e91e63; font-size: 16px; margin-bottom: 10px; }
    input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
   .btn-simpan { background: #e91e63; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
   .item { display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
   .item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
   .btn-hapus { background: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
   .btn-edit { background: #ffc107; color: #333; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; margin-right: 5px; }
   #loginBox input { margin-bottom:10px; }
  </style>

  <!-- 1. TAMBAH SCRIPT FIREBASE DI SINI -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
</head>
<body>

  <!-- 2. TAMBAH BOX LOGIN -->
  <div id="loginBox" class="box">
    <h3>Login Admin</h3>
    <input type="email" id="email" placeholder="Email Admin">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()" class="btn-simpan">Masuk</button>
  </div>

  <!-- 3. BUNGKUS SEMUA KONTEN LAMA KE DALAM INI -->
  <div id="adminPanel" style="display:none;">
    <div class="header">
      <h1>👩🏻‍💻 Admin Panel</h1>
      <button onclick="logout()" class="btn-kecil">🔒 Logout</button>
    </div>

    <div class="box">
      <h3 id="formJudul">Tambah Barang Baru</h3>
      <input type="hidden" id="editId" value="">
      <input type="text" id="nama" placeholder="Nama Barang">
      <input type="number" id="harga" placeholder="Harga / Hari">
      <input type="text" id="gambar" placeholder="Link Gambar URL">
      <select id="status">
        <option value="Tersedia">Tersedia</option>
        <option value="Tersewa">Tersewa</option>
      </select>
      <button onclick="simpanBarang()" class="btn-simpan" id="btnSimpan">Simpan Barang</button>
    </div>

    <div class="box">
      <div class="total" id="totalBarang"></div>
      <h3>Daftar Barang</h3>
      <div id="daftar"></div>
    </div>

    <!-- 4. TAMBAH BOX PESANAN BARU -->
    <div class="box">
      <h3>📦 Data Pesanan Masuk</h3>
      <div id="daftarPesanan">Loading...</div>
    </div>
  </div>

  <script>
    // 5. GANTI DENGAN KONFIG FIREBASE KAMU
    const firebaseConfig = {
  apiKey: "AIzaSyAYxXxVaLLmsS3IWHCSIvFt8lqxSTS9-4g",
  authDomain: "manica-babyrent.firebaseapp.com",
  projectId: "manica-babyrent",
  storageBucket: "manica-babyrent.firebasestorage.app",
  messagingSenderId: "1066157729598",
  appId: "1:1066157729598:web:88eecf6401d9991ffe2e6f",
  measurementId: "G-BX7NCRFWPJ"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // 6. CEK LOGIN FIREBASE
    function login(){
      auth.signInWithEmailAndPassword(email.value, password.value)
      .catch(err => alert("Login Gagal: " + err.message));
    }
    function logout(){ auth.signOut() }

    auth.onAuthStateChanged(user => {
      if(user){
        document.getElementById('loginBox').style.display='none';
        document.getElementById('adminPanel').style.display='block';
        tampilkanBarang();
        tampilkanPesanan();
      }else{
        document.getElementById('loginBox').style.display='block';
        document.getElementById('adminPanel').style.display='none';
      }
    });

    // 7. SIMPAN BARANG KE FIREBASE
    function simpanBarang() {
      let nama = document.getElementById("nama").value;
      let harga = document.getElementById("harga").value;
      let status = document.getElementById("status").value;
      let gambar = document.getElementById("gambar").value;
      let editId = document.getElementById("editId").value;

      if(!nama || !harga || !gambar) { alert("Lengkapi semua data!"); return; }

      let data = { nama, harga: parseInt(harga), status, gambar };

      if(editId != "") {
        db.collection("produk").doc(editId).update(data);
      } else {
        db.collection("produk").add(data);
      }
      alert("Data disimpan!");
      resetForm();
    }

    // 8. TAMPILKAN BARANG DARI FIREBASE
    function tampilkanBarang() {
      db.collection("produk").onSnapshot(snapshot => {
        let data = [];
        snapshot.forEach(doc => data.push({id: doc.id, ...doc.data()}));
        
        document.getElementById("totalBarang").innerText = `Total Barang: ${data.length}`;
        let daftar = document.getElementById("daftar");
        daftar.innerHTML = "";
        data.forEach((item) => {
          daftar.innerHTML += `
            <div class="item">
              <img src="${item.gambar}">
              <div style="flex:1;">
                <b>${item.nama}</b><br>
                Rp ${item.harga.toLocaleString()} / hari<br>
                Status: ${item.status}
              </div>
              <button onclick="editBarang('${item.id}')" class="btn-edit">Edit</button>
              <button onclick="hapusBarang('${item.id}')" class="btn-hapus">Hapus</button>
            </div>
          `;
        });
      });
    }

    function editBarang(id) {
      db.collection("produk").doc(id).get().then(doc => {
        let item = doc.data();
        document.getElementById("editId").value = id;
        document.getElementById("nama").value = item.nama;
        document.getElementById("harga").value = item.harga;
        document.getElementById("status").value = item.status;
        document.getElementById("gambar").value = item.gambar;
        document.getElementById("formJudul").innerText = "Edit Barang";
        document.getElementById("btnSimpan").innerText = "Update Barang";
      });
    }

    function hapusBarang(id) {
      if(confirm("Yakin hapus?")) {
        db.collection("produk").doc(id).delete();
      }
    }

    function resetForm() {
      document.getElementById("editId").value = "";
      document.getElementById("nama").value = "";
      document.getElementById("harga").value = "";
      document.getElementById("gambar").value = "";
      document.getElementById("formJudul").innerText = "Tambah Barang Baru";
      document.getElementById("btnSimpan").innerText = "Simpan Barang";
    }

    // 9. TAMPILKAN PESAN DARI FIREBASE
    function tampilkanPesanan() {
      db.collection("pesanan").orderBy("timestamp", "desc").onSnapshot(snapshot => {
        let html = "";
        snapshot.forEach(doc => {
          let d = doc.data();
          html += `<div class="item">
            <div style="flex:1;">
              <b>${d.nama}</b><br>
              Produk: ${d.produk}<br>
              Total: Rp${d.total_harga.toLocaleString()}<br>
              Status: 
              <select onchange="updateStatus('${doc.id}', this.value, '${doc.data().nohp}', '${doc.data().nama}', '${doc.data().produk}')">
              <option>Baru Masuk</option>
              <option>Diproses</option>
              <option>Selesai</option>
          </select>
            </div>
          </div>`;
        });
        document.getElementById("daftarPesanan").innerHTML = html || "Belum ada pesanan";
      });
    }
    function updateStatus(id, status, nohp, nama, produk){
  db.collection("pesanan").doc(id).update({
    status: status
  }).then(() => {
    alert("Status diupdate ke: " + status);

    // KALAU STATUSNYA DIPROSES, LANGSUNG BUKA WA KE CUSTOMER
    if(status === "Diproses"){
      const pesan = `Halo ${nama}! 😊%0A
Pesanan kamu untuk *${produk}* sudah kami *PROSES* ya.%0A
Tim Manica Babyrent akan segera hubungi kamu untuk konfirmasi pengiriman & pembayaran.`;
      
      window.location.href = `https://wa.me/${nohp}?text=${pesan}`;
    }
  })
}
  </script>
</body>
</html>
