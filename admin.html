<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Manica Babys</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow">
    <h1 class="text-2xl font-bold text-pink-600 mb-6">Dashboard Admin Manica Babys</h1>
    
    <div class="mb-6">
      <h2 class="font-bold mb-2">Tambah Produk Baru</h2>
      <input id="nama" placeholder="Nama Produk" class="border p-2 rounded w-full mb-2">
      <input id="harga" placeholder="Contoh: Rp 25.000" class="border p-2 rounded w-full mb-2">
      <button onclick="tambah()" class="bg-pink-500 text-white px-4 py-2 rounded">Simpan</button>
    </div>

    <h2 class="font-bold mb-2">Daftar Produk</h2>
    <ul id="list" class="space-y-2"></ul>

    <a href="index.html" class="text-pink-600 underline mt-6 block">← Lihat Website</a>
  </div>

<script>
let produk = JSON.parse(localStorage.getItem('produkManica')) || [
  {nama: "Stroller Bayi", harga: "Rp 50.000"},
  {nama: "Bouncer Bayi", harga: "Rp 30.000"},
  {nama: "Carseat", harga: "Rp 40.000"}
];

function simpan() {
  localStorage.setItem('produkManica', JSON.stringify(produk));
}

function tampil() {
  document.getElementById('list').innerHTML = produk.map((p,i) => 
    `<li class="border p-2 rounded flex justify-between">${p.nama} - ${p.harga}
     <button onclick="hapus(${i})" class="text-red-500">Hapus</button></li>`
  ).join('');
}

function tambah() {
  let n = document.getElementById('nama').value;
  let h = document.getElementById('harga').value;
  if(n && h) {
    produk.push({nama: n, harga: h});
    simpan(); tampil();
    document.getElementById('nama').value = '';
    document.getElementById('harga').value = '';
  }
}
function hapus(i) { produk.splice(i,1); simpan(); tampil(); }
tampil();
</script>
</body>
</html>
