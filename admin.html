<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Manica Baby Rent</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; max-width: 600px; margin: auto; }
    h1 { text-align: center; color: #e91e63; }
    form { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { background: #e91e63; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 16px; }
    button:disabled { background: #ccc; }
    img.preview { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; }
  </style>
</head>
<body>

  <h1>Admin Panel</h1>
  <form id="addProductForm">
    <label>Nama Barang</label>
    <input type="text" id="productName" required>

    <label>Harga / Hari</label>
    <input type="number" id="productPrice" required>

    <label>Foto Barang</label>
    <input type="file" id="productImage" accept="image/*" required>
    <img id="preview" class="preview">

    <button type="submit" id="addProductBtn">Tambah Barang</button>
  </form>

  <script>
    const form = document.getElementById('addProductForm');
    const preview = document.getElementById('preview');
    const fileInput = document.getElementById('productImage');

    // Preview gambar
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
          preview.style.display = 'block';
        }
        reader.readAsDataURL(file);
      }
    });

    // Submit form
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.getElementById('addProductBtn');
      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      const name = document.getElementById('productName').value;
      const price = document.getElementById('productPrice').value;
      const file = fileInput.files[0];

      const reader = new FileReader();
      reader.onload = function(e) {
        let data = JSON.parse(localStorage.getItem('manica_barang')) || [];
        
        data.push({
          nama: name,
          harga: price,
          gambar: e.target.result, // simpan sebagai base64
          status: "Tersedia"
        });

        localStorage.setItem('manica_barang', JSON.stringify(data));

        alert('Produk berhasil ditambah!');
        form.reset();
        preview.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Tambah Barang';
      }
      reader.readAsDataURL(file); // convert gambar jadi base64
    });
  </script>

</body>
</html>
