<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Manica Rental</title>
<style>
  body{background:#fff0f5; font-family:Poppins; margin:0; padding:20px}
  .box{background:white; padding:20px; border-radius:15px; box-shadow:0 4px 20px rgba(0,0,0,0.1); max-width:1000px; margin:auto}
  input, button, select{padding:10px; margin:5px; border-radius:8px; border:1px solid #ddd}
  button{background:#ff6b9d; color:white; border:none; font-weight:bold; cursor:pointer}
  table{width:100%; border-collapse:collapse; margin-top:20px}
  th,td{border:1px solid #eee; padding:8px; text-align:left; font-size:14px}
  img{width:60px; height:60px; object-fit:cover}
  .btn-edit{background:orange} .btn-hapus{background:red} .btn-logout{background:gray}
</style>
</head>
<body>

<div class="box" id="loginBox">
  <h2>Login Admin 🎀</h2>
  <input type="email" id="email" placeholder="Email Admin">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Masuk</button>
  <p style="font-size:12px">Daftarin email ini dulu di Firebase Authentication</p>
</div>

<div class="box" id="panelBox" style="display:none">
  <h2>Panel Admin Manica Rental <button class="btn-logout" onclick="logout()">Logout</button></h2>
  <button onclick="tambahBarang()">+ Tambah Barang</button>
  
  <table id="tabelBarang">
    <thead><tr><th>Gambar</th><th>Nama</th><th>Harga/Hari</th><th>Status</th><th>Aksi</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script type="module">
  // 1. GANTI DENGAN CONFIG FIREBASE KAMU
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBdGxxs3KNTnPdd1BGUV8dcMPr-NHBTeIk",
  authDomain: "manicababy.firebaseapp.com",
  projectId: "manicababy",
  storageBucket: "manicababy.firebasestorage.app",
  messagingSenderId: "751399761719",
  appId: "1:751399761719:web:f76cf7ed26baac7366ccb2",
  measurementId: "G-S2J3EM9YV1"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 2. LOGIN LOGOUT
  window.login = async () => {
    try {
      await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
    } catch(e) { alert("Login gagal: " + e.message) }
  }
  window.logout = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    if(user){
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('panelBox').style.display = 'block';
      loadTabel();
    } else {
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('panelBox').style.display = 'none';
    }
  });

  // 3. CRUD FIRESTORE
  async function loadTabel(){
    const querySnapshot = await getDocs(collection(db, "barang"));
    let html = "";
    querySnapshot.forEach((docSnap) => {
      let item = docSnap.data();
      html += `<tr>
        <td><img src="${item.gambar}"></td>
        <td>${item.nama}</td>
        <td>Rp ${parseInt(item.harga).toLocaleString('id-ID')}</td>
        <td><button onclick="toggleStatus('${docSnap.id}', '${item.status}')">${item.status}</button></td>
        <td>
          <button class="btn-edit" onclick="editBarang('${docSnap.id}')">Edit</button>
          <button class="btn-hapus" onclick="hapusBarang('${docSnap.id}')">Hapus</button>
        </td>
      </tr>`;
    });
    document.querySelector('#tabelBarang tbody').innerHTML = html;
  }

  window.tambahBarang = async () => {
    let nama = prompt("Nama Barang:");
    let harga = prompt("Harga per 1 Hari:");
    let gambar = prompt("Link Gambar:");
    if(nama && harga && gambar) {
      await addDoc(collection(db, "barang"), {nama, harga, gambar, status:"Tersedia"});
      loadTabel();
    }
  }

  window.editBarang = async (id) => {
    let nama = prompt("Edit Nama:");
    let harga = prompt("Edit Harga:");
    let gambar = prompt("Edit Gambar:");
    if(nama) await updateDoc(doc(db, "barang", id), {nama, harga, gambar});
    loadTabel();
  }

  window.hapusBarang = async (id) => {
    if(confirm("Yakin hapus?")) {
      await deleteDoc(doc(db, "barang", id));
      loadTabel();
    }
  }

  window.toggleStatus = async (id, status) => {
    let newStatus = status == "Tersedia" ? "Disewa" : "Tersedia";
    await updateDoc(doc(db, "barang", id), {status: newStatus});
    loadTabel();
  }
</script>
</body>
</html>
