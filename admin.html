<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - Manica Rental</title>
<style>
 body{background:#; font-family:Poppins; display:flex; justify-content:center; align-items:center; height:100vh; margin:0}
.box{background:white; padding:30px; border-radius:15px; box-shadow:0 4px 20px rgba(0,0,0,0.1); width:90%; max-width:400px}
 input, button{width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #ddd}
 button{background:#; color:white; border:none; font-weight:bold; cursor:pointer}
 table{width:100%; border-collapse:collapse; margin-top:20px}
 th,td{border:1px solid #eee; padding:8px; text-align:left; font-size:14px}
 img{width:50px; height:50px; object-fit:cover}
.btn-edit{background:orange}.btn-hapus{background:red}
.btn-toggle{background:green}
</style>
</head>
<body>

<!-- HALAMAN LOGIN -->
<div class="box" id="loginBox">
 <h2>Login Admin 🎀</h2>
 <input type="text" id="username" placeholder="Username">
 <input type="password" id="password" placeholder="Password">
 <button onclick="login()">Masuk</button>
 <p style="font-size:12px; color:gray">Default: admin / manica123</p>
</div>

<!-- HALAMAN PANEL -->
<div class="box" id="panelBox" style="display:none; max-width:1000px">
 <h2>Panel Admin Manica Rental</h2>
 <button onclick="logout()" style="background:gray; width:auto; float:right">Logout</button>
 <button onclick="tambahBarang()">+ Tambah Barang</button>

 <table id="tabelBarang">
 <thead><tr><th>Gambar</th><th>Nama</th><th>Harga/Hari</th><th>Status</th><th>Aksi</th></tr></thead>
 <tbody></tbody>
 </table>
</div>

<script>
const USER = "admin"; // GANTI USERNAME KAMU
const PASS = "manica123"; // GANTI PASSWORD KAMU

function login(){
 if(document.getElementById('username').value == USER && document.getElementById('password').value == PASS){
 localStorage.setItem('isLogin', 'true');
 showPanel();
 } else {
 alert("Username atau Password salah!");
 }
}

function logout(){
 localStorage.removeItem('isLogin');
 location.reload();
}

function showPanel(){
 document.getElementById('loginBox').style.display = 'none';
 document.getElementById('panelBox').style.display = 'block';
 loadTabel();
}

function getData(){
 return JSON.parse(localStorage.getItem('manica_barang')) || [];
}
function saveData(data){
 localStorage.setItem('manica_barang', JSON.stringify(data));
}

function loadTabel(){
 let data = getData();
 let html = "";
 data.forEach((item, i) => {
 html += `<tr>
 <td><img src="${item.gambar}"></td>
 <td>${item.nama}</td>
 <td>Rp ${parseInt(item.harga).toLocaleString('id-ID')}</td>
 <td><button class="btn-toggle" onclick="toggleStatus(${i})">${item.status}</button></td>
 <td>
 <button class="btn-edit" onclick="editBarang(${i})">Edit</button>
 <button class="btn-hapus" onclick="hapusBarang(${i})">Hapus</button>
 </td>
 </tr>`;
 });
 document.querySelector('#tabelBarang tbody').innerHTML = html;
}

function tambahBarang(){
 let nama = prompt("Nama Barang:");
 let harga = prompt("Harga per 1 Hari:");
 let gambar = prompt("Link Gambar:");
 if(nama && harga && gambar){
 let data = getData();
 data.push({nama, harga, gambar, status:"Tersedia"});
 saveData(data);
 loadTabel();
 }
}

function editBarang(i){
 let data = getData();
 data[i].nama = prompt("Edit Nama:", data[i].nama) || data[i].nama;
 data[i].harga = prompt("Edit Harga:", data[i].harga) || data[i].harga;
 data[i].gambar = prompt("Edit Link Gambar:", data[i].gambar) || data[i].gambar;
 saveData(data);
 loadTabel();
}

function hapusBarang(i){
 if(confirm("Yakin hapus?")){
 let data = getData();
 data.splice(i,1);
 saveData(data);
 loadTabel();
 }
}

function toggleStatus(i){
 let data = getData();
 data[i].status = data[i].status == "Tersedia" ? "Disewa": "Tersedia";
 saveData(data);
 loadTabel();
}

// Cek sudah login belum
if(localStorage.getItem('isLogin') == 'true') showPanel();
</script>
</body>
</html>
