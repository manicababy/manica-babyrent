<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - Manica Baby Rent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    body { background: #f4f4f9; margin: 0; padding: 20px; }
    .box { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { color: #e91e63; text-align: center; }
    .login input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
    .login button { width: 100%; padding: 12px; background: #e91e63; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th { background: #e91e63; color: white; padding: 12px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    tr:hover { background: #fff0f5; }
    select { padding: 6px; border-radius: 6px; border: 1px solid #ccc; }
    .btn-wa { background: #25D366; color: white; padding: 6px 10px; border-radius: 6px; text-decoration: none; font-size: 12px; }
    .logout { float: right; background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    @media(max-width: 768px) { table { display: block; overflow-x: auto; } }
  </style>
</head>
<body>

<div class="box">
  <h1>📋 Panel Admin Manica Baby Rent</h1>

  <!-- BOX LOGIN -->
  <div id="loginBox" class="login">
    <h3>Login Admin</h3>
    <input type="email" id="email" placeholder="Email Admin">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p style="font-size:12px; color:gray;">Buat akun admin dulu di Firebase > Authentication</p>
  </div>

  <!-- PANEL ADMIN -->
  <div id="adminPanel" style="display:none;">
    <button class="logout" onclick="logout()">Logout</button>
    <h3>Data Pesanan Masuk</h3>
    <table>
      <thead>
        <tr>
          <th>Waktu</th>
          <th>Customer</th>
          <th>Produk</th>
          <th>Tanggal</th>
          <th>Total</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tabelPesanan">
        <tr><td colspan="7">Loading data...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// ====== 1. GANTI INI SAMA DENGAN DI index.html ======
const firebaseConfig = {
  apiKey: "AIzaSyAYxXxVaLLmsS3IWHCSIvFt8lqxSTS9-4g",
  authDomain: "manica-babyrent.firebaseapp.com",
  projectId: "manica-babyrent",
  storageBucket: "manica-babyrent.firebasestorage.app",
  messagingSenderId: "1066157729598",
  appId: "1:1066157729598:web:88eecf6401d9991ffe2e6f",
  measurementId: "G-BX7NCRFWPJ"
};
// ===================================================

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
  .catch(err => alert("Login Gagal: " + err.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if(user) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadData();
  } else {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
  }
});

function loadData() {
  db.collection("pesanan").orderBy("timestamp", "desc").onSnapshot(snapshot => {
    let html = "";
    if(snapshot.empty) html = '<tr><td colspan="7">Belum ada pesanan</td></tr>';
    
    snapshot.forEach(doc => {
      const d = doc.data();
      const tgl = d.timestamp ? d.timestamp.toDate().toLocaleString('id-ID') : '-';
      const total = d.total_harga ? d.total_harga.toLocaleString('id-ID') : '0';
      const pesanWA = `Halo ${d.nama}, pesanan ${d.produk} kamu statusnya: ${d.status}. Terima kasih Manica Baby`;
      
      html += `<tr>
        <td>${tgl}</td>
        <td><b>${d.nama}</b><br>${d.alamat}</td>
        <td>${d.produk}<br>Rp${d.harga_per_hari.toLocaleString('id-ID')}/hari</td>
        <td>${d.tgl_sewa} s/d ${d.tgl_kembali}<br><b>${d.total_hari} Hari</b></td>
        <td><b>Rp${total}</b></td>
        <td>
          <select onchange="updateStatus('${doc.id}', this.value)">
            <option ${d.status=='Baru Masuk'?'selected':''}>Baru Masuk</option>
            <option ${d.status=='Diproses'?'selected':''}>Diproses</option>
            <option ${d.status=='Siap Antar'?'selected':''}>Siap Antar</option>
            <option ${d.status=='Selesai'?'selected':''}>Selesai</option>
            <option ${d.status=='Batal'?'selected':''}>Batal</option>
          </select>
        </td>
        <td>
          <a class="btn-wa" href="https://wa.me/?text=${encodeURIComponent(pesanWA)}" target="_blank">WA</a>
        </td>
      </tr>`;
    });
    document.getElementById('tabelPesanan').innerHTML = html;
  });
}

function updateStatus(id, statusBaru) {
  db.collection("pesanan").doc(id).update({status: statusBaru});
  alert("Status diubah jadi: " + statusBaru);
}
</script>

</body>
</html>
