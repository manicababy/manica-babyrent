<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Form Sewa - Manica Baby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family:Poppins; background:#fff8fb; padding:20px; }
    .form { max-width:500px; margin:auto; background:white; padding:25px; border-radius:15px; }
    input, textarea { width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:8px; }
    button { width:100%; background:#25D366; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="form">
  <h2 style="color:#e91e63; text-align:center;">📝 Form Pemesanan</h2>
  <p><b>Produk:</b> <span id="namaProduk"></span></p>
  <p><b>Harga:</b> Rp<span id="hargaProduk"></span> / hari</p>
  
  <form id="formSewa">
    <input type="text" id="nama" placeholder="Nama Lengkap" required>
    <input type="date" id="tgl_sewa" required>
    <input type="date" id="tgl_kembali" required>
    <textarea id="alamat" placeholder="Alamat Lengkap" required></textarea>
    <button type="submit">Kirim Pesanan</button>
  </form>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAYxXxVaLLmsS3IWHCSIvFt8lqxSTS9-4g",
  authDomain: "manica-babyrent.firebaseapp.com",
  projectId: "manica-babyrent",
  storageBucket: "manica-babyrent.firebasestorage.app",
  messagingSenderId: "1066157729598",
  appId: "1:1066157729598:web:88eecf6401d9991ffe2e6f",
  measurementId: "G-BX7NCRFWPJ"
};

const urlParams = new URLSearchParams(window.location.search);
const namaProduk = urlParams.get('produk');
const hargaProduk = urlParams.get('harga');
document.getElementById('namaProduk').innerText = namaProduk;
document.getElementById('hargaProduk').innerText = parseInt(hargaProduk).toLocaleString('id-ID');

document.getElementById('formSewa').addEventListener('submit', async function(e) {
  e.preventDefault();
  const tgl_sewa = new Date(document.getElementById('tgl_sewa').value);
  const tgl_kembali = new Date(document.getElementById('tgl_kembali').value);
  const total_hari = (tgl_kembali - tgl_sewa) / (1000 * 60 * 60 * 24) + 1;
  
  await db.collection("pesanan").add({
    nama: document.getElementById('nama').value,
    produk: namaProduk,
    harga_per_hari: parseInt(hargaProduk),
    tgl_sewa: document.getElementById('tgl_sewa').value,
    tgl_kembali: document.getElementById('tgl_kembali').value,
    total_hari: total_hari,
    total_harga: total_hari * parseInt(hargaProduk),
    alamat: document.getElementById('alamat').value,
    status: "Baru Masuk",
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });
  alert("Pesanan berhasil dikirim!");
  window.location.href = "/manica-babyrent/index.html";
});
</script>
</body>
</html>
