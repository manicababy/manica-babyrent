<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Form Sewa - Manica Baby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family:Poppins; background:#fff8fb; padding:20px; }
    .form { max-width:500px; margin:auto; background:white; padding:25px; border-radius:15px; }
    input, textarea { width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:8px; }
    button { width:100%; background:#25D366; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="form">
  <h2 style="color:#e91e63; text-align:center;">📝 Form Pemesanan</h2>
  <p><b>Produk:</b> <span id="namaProduk"></span></p>
  <p><b>Harga:</b> Rp<span id="hargaProduk"></span> / hari</p>
  
  <form id="formSewa">
    <input type="text" id="nama" placeholder="Nama Lengkap" required>
    <input type="date" id="tgl_sewa" required>
    <input type="date" id="tgl_kembali" required>
    <textarea id="alamat" placeholder="Alamat Lengkap" required></textarea>
    <input type="number" id="nohp" placeholder="No WA Aktif" required>
    <button type="submit">Kirim Pesanan</button>
  </form>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAYxXxVaLLmsS3IWHCSIvFt8lqxSTS9-4g",
  authDomain: "manica-babyrent.firebaseapp.com",
  projectId: "manica-babyrent",
  storageBucket: "manica-babyrent.firebasestorage.app",
  messagingSenderId: "1066157729598",
  appId: "1:1066157729598:web:88eecf6401d9991ffe2e6f",
  measurementId: "G-BX7NCRFWPJ"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
  
// AMBIL DATA DARI URL DULU
const urlParams = new URLSearchParams(window.location.search);
const namaProduk = urlParams.get('produk');
const harga = urlParams.get('harga');

// TAMPILIN KE FORM
document.getElementById('produkText').innerText = namaProduk;
document.getElementById('hargaText').innerText = `Rp ${harga} / hari`;


form.addEventListener('submit', async (e) => {
  e.preventDefault(); // INI WAJIB ADA BIAR GA RELOAD

  // CEK APA ADA YG KOSONG
  if(!document.getElementById('nama').value || !document.getElementById('nohp').value || !document.getElementById('tglSewa').value){
    alert("Nama, Tgl, dan No WA wajib diisi ya kak!");
    return;
  }

  // HITUNG TOTAL HARI & BAYAR
  const tglSewa = new Date(document.getElementById('tglSewa').value);
  const tglKembali = new Date(document.getElementById('tglKembali').value);
  const totalHari = Math.ceil((tglKembali - tglSewa) / (1000 * 60 * 60 * 24)) + 1;
  const totalBayar = totalHari * harga;

  // AMBIL NO HP DAN OTOMATIS JADI 62
  let nohpCustomer = document.getElementById('nohp').value;
  if(nohpCustomer.startsWith('0')){
    nohpCustomer = '62' + nohpCustomer.substring(1);
  }

  try {
    // 1. SIMPAN KE FIREBASE
    await db.collection("pesanan").add({
      nama: document.getElementById('nama').value,
      alamat: document.getElementById('alamat').value,
      nohp: nohpCustomer,
      produk: namaProduk,
      harga: harga,
      tglSewa: document.getElementById('tglSewa').value,
      tglKembali: document.getElementById('tglKembali').value,
      totalHari: totalHari,
      totalBayar: totalBayar,
      status: "Baru Masuk",
      waktu: firebase.firestore.FieldValue.serverTimestamp()
    });

    // 2. KIRIM WA KE ADMIN
    let pesanWA = `PESAN BARU MASUK 🔔%0A
Nama: ${document.getElementById('nama').value}%0A
Produk: ${namaProduk}%0A
Tgl Sewa: ${document.getElementById('tglSewa').value}%0A
Tgl Kembali: ${document.getElementById('tglKembali').value}%0A
Total: ${totalHari} Hari - Rp${totalBayar}%0A
Alamat: ${document.getElementById('alamat').value}%0A
No WA: ${nohpCustomer}`;
    let noWAAdmin = "6281543054193"; // GANTI PAKE NO KAMU
    window.location.href = `https://wa.me/${noWAAdmin}?text=${pesanWA}`;

    // 3. BALIK KE INDEX SETELAH 3 DETIK
    setTimeout(() => {
      window.location.href = "/manica-babyrent/index.html";
    }, 3000);

  } catch (error) {
    alert("Gagal kirim: " + error);
  }
});
</script>
</body>
</html>
