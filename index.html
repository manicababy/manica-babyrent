<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manica Baby Rent - Sewa Perlengkapan Bayi & Anak Kendari</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #fff8fb; color: #333; }
    header { background: #e91e63; color: white; padding: 15px 20px; text-align: center; }
    .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
    .produk-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
    .card h3 { margin: 10px 0; color: #e91e63; }
    .harga { font-weight: bold; font-size: 18px; margin-bottom: 10px; }
    .sewa-btn { background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    .sewa-btn:hover { background: #1ebe5a; }
    
    .form-sewa { background: white; padding: 25px; border-radius: 15px; margin-top: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .form-sewa h2 { color: #e91e63; margin-bottom: 15px; text-align: center; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    #hasil-hitung { background:#f8f9fa; padding:12px; border-radius:10px; margin-bottom:12px; display:none; }
    #error-tanggal { color:red; font-size:13px; text-align:center; display:none; margin-top:-8px; }
    .submit-btn { width: 100%; background: #25D366; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
  
  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>
<body>

<header>
  <h1>Manica Baby Rent</h1>
  <p>Sewa Perlengkapan Bayi & Anak Terlengkap & Terjangkau</p>
</header>

<div class="container">
  <h2 style="text-align:center; margin: 20px 0; color:#e91e63;">Produk Sewa Kami</h2>
  <div class="produk-grid">
    
    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Stroller">
      <h3>Stroller Bayi</h3>
      <p class="harga">Rp50.000 / hari</p>
      <button class="sewa-btn" onclick="isiForm('Stroller Bayi', '50000')">Sewa Sekarang</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Mainan">
      <h3>Mainan Edukasi</h3>
      <p class="harga">Rp15.000 / hari</p>
      <button class="sewa-btn" onclick="isiForm('Mainan Edukasi', '15000')">Sewa Sekarang</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Box Bayi">
      <h3>Box Bayi</h3>
      <p class="harga">Rp40.000 / hari</p>
      <button class="sewa-btn" onclick="isiForm('Box Bayi', '40000')">Sewa Sekarang</button>
    </div>

  </div>

  <!-- FORM SEWA -->
  <div class="form-sewa">
    <h2>📝 Form Pemesanan Sewa</h2>
    <form id="formSewa">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" required>
      </div>
      <div class="form-group">
        <label>Pilih Produk</label>
        <select id="produk" required>
          <option value="">-- Pilih dari tombol di atas --</option>
          <option value="Stroller Bayi">Stroller Bayi</option>
          <option value="Mainan Edukasi">Mainan Edukasi</option>
          <option value="Box Bayi">Box Bayi</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tanggal Sewa</label>
        <input type="date" id="tgl_sewa" required>
      </div>
      <div class="form-group">
        <label>Tanggal Kembali</label>
        <input type="date" id="tgl_kembali" required>
      </div>
      
      <div id="hasil-hitung">
        <p><b>Total Hari:</b> <span id="total-hari">0</span> Hari</p>
        <p><b>Total Harga:</b> Rp<span id="total-harga">0</span></p>
      </div>
      <p id="error-tanggal">⚠️ Tanggal Kembali tidak boleh sebelum Tanggal Sewa</p>

      <div class="form-group">
        <label>Alamat Lengkap</label>
        <textarea id="alamat" rows="3" required></textarea>
      </div>
      <div class="form-group">
        <label>Catatan</label>
        <textarea id="catatan" rows="2"></textarea>
      </div>
      
      <button type="submit" class="submit-btn">Kirim Pesanan via WhatsApp</button>
    </form>
  </div>
</div>

<script>
// ====== 1. GANTI 3 DATA INI ======
const firebaseConfig = {
  apiKey: "AIzaSyAYxXxVaLLmsS3IWHCSIvFt8lqxSTS9-4g",
  authDomain: "manica-babyrent.firebaseapp.com",
  projectId: "manica-babyrent",
  storageBucket: "manica-babyrent.firebasestorage.app",
  messagingSenderId: "1066157729598",
  appId: "1:1066157729598:web:88eecf6401d9991ffe2e6f",
  measurementId: "G-BX7NCRFWPJ"
};
const NOMOR_WA_ADMIN = "6281543054193"; // GANTI NOMOR WA KAMU
// =================================

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let hargaSekarang = 0;

function isiForm(namaProduk, harga) {
  hargaSekarang = parseInt(harga);
  document.getElementById('produk').value = namaProduk;
  document.querySelector('.form-sewa').scrollIntoView({ behavior: 'smooth' });
  hitungTotal();
}

function hitungTotal() {
  const tgl_sewa = new Date(document.getElementById('tgl_sewa').value);
  const tgl_kembali = new Date(document.getElementById('tgl_kembali').value);
  const hasilDiv = document.getElementById('hasil-hitung');
  const errorDiv = document.getElementById('error-tanggal');
  const btnSubmit = document.querySelector('.submit-btn');
  
  hasilDiv.style.display = 'none';
  errorDiv.style.display = 'none';
  btnSubmit.disabled = false;
  btnSubmit.style.background = '#25D366';

  if(tgl_sewa && tgl_kembali && hargaSekarang > 0) {
    if(tgl_kembali < tgl_sewa) {
      errorDiv.style.display = 'block';
      btnSubmit.disabled = true;
      btnSubmit.style.background = '#ccc';
      return;
    }
    const selisih = (tgl_kembali - tgl_sewa) / (1000 * 60 * 60 * 24) + 1; 
    const totalHarga = selisih * hargaSekarang;
    
    document.getElementById('total-hari').innerText = selisih;
    document.getElementById('total-harga').innerText = new Intl.NumberFormat('id-ID').format(totalHarga);
    hasilDiv.style.display = 'block';
  }
}

document.getElementById('tgl_sewa').addEventListener('change', hitungTotal);
document.getElementById('tgl_kembali').addEventListener('change', hitungTotal);

document.getElementById('formSewa').addEventListener('submit', async function(e) {
  e.preventDefault(); 
  const btn = document.querySelector('.submit-btn');
  btn.innerText = "Mengirim...";
  btn.disabled = true;

  const dataPesanan = {
    nama: document.getElementById('nama').value,
    produk: document.getElementById('produk').value,
    harga_per_hari: hargaSekarang,
    tgl_sewa: document.getElementById('tgl_sewa').value,
    tgl_kembali: document.getElementById('tgl_kembali').value,
    total_hari: parseInt(document.getElementById('total-hari').innerText),
    total_harga: parseInt(document.getElementById('total-harga').innerText.replace(/\./g, '')),
    alamat: document.getElementById('alamat').value,
    catatan: document.getElementById('catatan').value,
    status: "Baru Masuk",
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };
  
  await db.collection("pesanan").add(dataPesanan);
  
  const pesan = `Pesanan Baru Manica Baby!%0A%0A*Nama*: ${dataPesanan.nama}%0A*Produk*: ${dataPesanan.produk}%0A*Total*: Rp${document.getElementById('total-harga').innerText}%0A*Tgl*: ${dataPesanan.tgl_sewa} s/d ${dataPesanan.tgl_kembali}`;
  window.open(`https://wa.me/${NOMOR_WA_ADMIN}?text=${pesan}`, '_blank'); 
  
  alert("Pesanan berhasil dikirim! Kami akan hubungi via WA");
  document.getElementById('formSewa').reset();
  document.getElementById('hasil-hitung').style.display = 'none';
  btn.innerText = "Kirim Pesanan via WhatsApp";
  btn.disabled = false;
});
</script>

</body>
</html>
