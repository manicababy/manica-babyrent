<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Katalog Manica Baby Rent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #fff0f5; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #e91e63; }
    
    /* Header kecil */
    .topbar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
    .btn-kecil { 
      background: #555; color: white; padding: 6px 12px; border-radius: 6px; 
      text-decoration: none; font-size: 12px; font-weight: bold; border: none; cursor: pointer;
    }
    .btn-kecil:hover { background: #e91e63; }
    .btn-logout { background: #dc3545; }
    .btn-logout:hover { background: #b02a37; }

    .katalog { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
    .card h3 { margin: 10px 0 5px; color: #333; }
    .harga { color: #e91e63; font-weight: bold; font-size: 18px; }
    .status { font-size: 14px; margin: 5px 0; }
    .btn-wa { display: inline-block; background: #25D366; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 8px; }
  </style>
</head>
<body>

  <h1>👼🏻 Manica Baby Rent</h1>

  <div class="topbar" id="topbar"></div>

  <div id="katalog" class="katalog"></div>

  <script>
    let noWa = "6281543054103"; // GANTI NOMOR WA KAMU DISINI
    let passwordAdmin = "manica123"; // GANTI PASSWORD ADMIN KAMU DISINI

    function cekLogin() {
      let topbar = document.getElementById("topbar");
      let login = localStorage.getItem("login_admin");

      if(login === "true") {
        topbar.innerHTML = `
          <a href="admin.html" class="btn-kecil">⚙️ Admin</a>
          <button onclick="logout()" class="btn-kecil btn-logout">Logout</button>
        `;
      } else {
        topbar.innerHTML = `
          <button onclick="login()" class="btn-kecil">🔑 Login Admin</button>
        `;
      }
    }

    function login() {
      let pass = prompt("Masukkan Password Admin:");
      if(pass === passwordAdmin) {
        localStorage.setItem("login_admin", "true");
        alert("Login Berhasil!");
        cekLogin();
      } else if(pass !== null) {
        alert("Password Salah!");
      }
    }

    function logout() {
      localStorage.removeItem("login_admin");
      alert("Logout Berhasil!");
      cekLogin();
    }

    function tampilkanKatalog() {
      let data = JSON.parse(localStorage.getItem("manica_barang")) || [];
      let katalog = document.getElementById("katalog");
      katalog.innerHTML = "";

      if(data.length === 0) {
        katalog.innerHTML = "<p style='text-align:center;'>Belum ada barang.</p>";
        return;
      }

      data.forEach((item, i) => {
        let pesan = `Halo Manica Baby Rent, saya mau sewa ${item.nama}`;
        katalog.innerHTML += `
          <div class="card">
            <img src="${item.gambar}" alt="${item.nama}">
            <h3>${item.nama}</h3>
            <p class="harga">Rp ${item.harga.toLocaleString()} / hari</p>
            <p class="status">Status: ${item.status}</p>
            <a href="https://wa.me/${noWa}?text=${encodeURIComponent(pesan)}" target="_blank" class="btn-wa">Sewa Sekarang</a>
          </div>
        `;
      });
    }
    
    cekLogin();
    tampilkanKatalog();
  </script>

</body>
</html>
